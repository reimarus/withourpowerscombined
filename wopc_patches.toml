# WOPC Patch Manifest — controls which FAF binary patches to include.
#
# Strategy: "include_all" means every hook/section from FA-Binary-Patches
# is compiled EXCEPT those listed in the exclude tables below.
#
# To exclude a patch, add its filename to the appropriate list.
# To switch to explicit inclusion, change strategy to "explicit" and
# populate the [include] tables instead.

[build]
strategy = "include_all"

[exclude]
# FAF lobby networking — WOPC uses direct connect, not FAF's ICE relay
# DesyncFix.cpp: hooks into excluded networking functions
hooks = ["gpg_net.cpp", "gpg_net.h", "DesyncFix.cpp"]
# gpg_net.cpp: FAF matchmaking protocol
# moho_decode.cpp: FAF network decoding (depends on gpg_net)
# moho_input.cpp: FAF input handling (depends on moho_decode)
# HashChecker.cpp: FAF client hash verification
sections = ["gpg_net.cpp", "moho_decode.cpp", "moho_input.cpp", "HashChecker.cpp"]
